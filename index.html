<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAMBAMAI — Comparison Mode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#3B82F6;
    --purple:#8B5CF6;
    --cyan:#22D3EE;
    --bg-deep:#0B0F1A;
    --panel:#111827;
    --panel-glass:rgba(17,24,39,0.55);
    --panel-glass-strong:rgba(24,32,51,0.7);
    --border-tint:rgba(139,146,255,0.22);
    --text-primary:#F3F4F6;
    --text-secondary:#9CA3AF;
    --text-muted:#6B7280;
    --success:#10B981;
    --warning:#F59E0B;
    --danger:#EF4444;
    --radius:16px;
  }
  [data-theme="light"]{
    --bg-deep:#F4F6FB;
    --panel:#FFFFFF;
    --panel-glass:rgba(255,255,255,0.65);
    --panel-glass-strong:rgba(255,255,255,0.85);
    --border-tint:rgba(139,92,246,0.18);
    --text-primary:#111827;
    --text-secondary:#4B5563;
    --text-muted:#8891A5;
    --blue:#3B82F6;
    --purple:#8B5CF6;
    --cyan:#0EA5C4;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter','Poppins',sans-serif;
    font-weight:400;
    color:var(--text-primary);
    min-height:100vh;
    background:
      radial-gradient(ellipse 900px 500px at 12% -8%, rgba(59,130,246,0.16), transparent 60%),
      radial-gradient(ellipse 900px 600px at 100% 8%, rgba(139,92,246,0.14), transparent 55%),
      var(--bg-deep);
    background-size:140% 140%, 140% 140%, 100% 100%;
    animation:drift-bg 22s ease-in-out infinite;
    transition:background-color .3s ease, color .3s ease;
  }
  @keyframes drift-bg{
    0%,100%{background-position:0% 0%, 100% 0%, 0 0;}
    50%{background-position:10% 6%, 88% 10%, 0 0;}
  }
  .wrap{max-width:1180px;margin:0 auto;padding:36px 28px 80px;}

  /* header */
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:34px;}
  .brand{display:flex;align-items:center;gap:14px;}
  .orb-wrap{display:flex;align-items:center;gap:10px;}
  .orb{width:40px;height:40px;border-radius:50%;position:relative;flex-shrink:0;
    background:radial-gradient(circle at 32% 30%, #a9c6ff, var(--blue) 45%, var(--purple) 100%);
    box-shadow:0 0 0 1px rgba(255,255,255,0.12) inset, 0 0 22px 3px rgba(59,130,246,0.5);
    animation:idle-pulse 3.2s ease-in-out infinite;
  }
  .orb.thinking{animation:think-pulse 1s ease-in-out infinite;}
  @keyframes idle-pulse{
    0%,100%{box-shadow:0 0 0 1px rgba(255,255,255,0.12) inset, 0 0 18px 2px rgba(59,130,246,0.4);}
    50%{box-shadow:0 0 0 1px rgba(255,255,255,0.12) inset, 0 0 30px 5px rgba(139,92,246,0.5);}
  }
  @keyframes think-pulse{
    0%,100%{transform:scale(1);box-shadow:0 0 0 1px rgba(255,255,255,0.18) inset, 0 0 24px 4px rgba(34,211,238,0.55);}
    50%{transform:scale(1.15);box-shadow:0 0 0 1px rgba(255,255,255,0.22) inset, 0 0 40px 9px rgba(34,211,238,0.75);}
  }
  .waveform{display:flex;align-items:center;gap:2.5px;height:18px;}
  .waveform span{width:3px;border-radius:2px;background:linear-gradient(180deg,var(--cyan),var(--blue));
    animation:wave 1.2s ease-in-out infinite;}
  .waveform span:nth-child(1){height:6px;animation-delay:0s;}
  .waveform span:nth-child(2){height:14px;animation-delay:.15s;}
  .waveform span:nth-child(3){height:9px;animation-delay:.3s;}
  .waveform span:nth-child(4){height:16px;animation-delay:.45s;}
  .waveform span:nth-child(5){height:7px;animation-delay:.6s;}
  @keyframes wave{0%,100%{transform:scaleY(0.4);}50%{transform:scaleY(1);}}
  .brand-text .word{font-family:'Sora',sans-serif;font-weight:800;font-size:21px;letter-spacing:0.2px;
    background:linear-gradient(90deg,#F3F4F6,#C7D2FE 55%,#DDD6FE);
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .brand-text .eyebrow{font-size:11.5px;color:var(--text-muted);letter-spacing:1.6px;text-transform:uppercase;margin-top:2px;font-weight:500;}
  .header-actions{display:flex;align-items:center;gap:12px;}
  .gear-btn,.theme-btn{width:38px;height:38px;border-radius:10px;background:var(--panel-glass);
    border:1px solid var(--border-tint);backdrop-filter:blur(10px);
    color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:background .25s ease, color .25s ease, transform .2s ease, box-shadow .25s ease;}
  .gear-btn:hover,.theme-btn:hover{background:var(--panel-glass-strong);color:var(--text-primary);
    transform:translateY(-2px);box-shadow:0 6px 18px rgba(59,130,246,0.2);}

  /* Auth UI */
  .auth-container { display: flex; align-items: center; gap: 12px; }
  .login-btn { background: linear-gradient(90deg, var(--blue), var(--purple)); color: #0B0F1A; border: none; padding: 8px 18px; border-radius: 999px; font-size: 13px; font-family: 'Sora', sans-serif; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
  .login-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(139,92,246,0.3); }
  .user-profile { display: flex; align-items: center; gap: 10px; background: var(--panel-glass); padding: 4px 12px 4px 6px; border-radius: 999px; border: 1px solid var(--border-tint); }
  .user-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }
  .user-details { display: flex; flex-direction: column; font-size: 12px; }
  .user-name { color: var(--text-primary); font-weight: 600; }
  .logout-link { color: var(--text-muted); font-size: 10px; cursor: pointer; text-decoration: underline; margin-top: 1px; }
  .logout-link:hover { color: var(--danger); }

  /* mode toggle */
  .mode-toggle{display:inline-flex;gap:3px;padding:3px;border-radius:11px;background:rgba(255,255,255,0.04);
    border:1px solid var(--border-tint);margin-bottom:14px;}
  .mode-btn{font-family:'Sora',sans-serif;font-weight:600;font-size:12.5px;color:var(--text-muted);
    background:transparent;border:none;border-radius:8px;padding:8px 15px;cursor:pointer;
    transition:all .25s ease;}
  .mode-btn:hover{color:var(--text-secondary);}
  .mode-btn.active{color:#0B0F1A;background:linear-gradient(90deg,var(--blue),var(--purple));
    box-shadow:0 4px 16px rgba(139,92,246,0.3);}

  /* composer */
  .composer{background:var(--panel-glass);backdrop-filter:blur(16px);border:1px solid transparent;
    border-image:linear-gradient(135deg, rgba(59,130,246,0.55), rgba(139,92,246,0.55)) 1;
    border-radius:var(--radius);padding:20px;transition:box-shadow .3s ease;}
  .composer:focus-within{box-shadow:0 0 0 1px rgba(59,130,246,0.25), 0 8px 28px rgba(139,92,246,0.14);}
  textarea{width:100%;min-height:78px;background:rgba(255,255,255,0.04);border:1px solid var(--border-tint);
    border-radius:10px;color:var(--text-primary);font-family:'Inter',sans-serif;font-size:14.5px;padding:12px 14px;
    resize:vertical;outline:none;line-height:1.6;transition:border-color .25s ease, box-shadow .25s ease;}
  textarea::placeholder{color:var(--text-muted);}
  textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,0.15);}

  .chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;align-items:center;}
  .chip{display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:999px;border:1px solid var(--border-tint);
    background:rgba(255,255,255,0.04);font-size:12.5px;font-weight:500;cursor:pointer;user-select:none;
    transition:all .25s ease;color:var(--text-secondary);}
  .chip .dot{width:7px;height:7px;border-radius:50%;}
  .chip.active{color:var(--text-primary);border-color:rgba(139,92,246,0.5);background:rgba(139,92,246,0.14);
    box-shadow:0 0 14px rgba(139,92,246,0.25);}
  .chip.add-chip{border-style:dashed;color:var(--text-muted);}
  .chip.add-chip:hover{color:var(--text-secondary);border-color:var(--border-tint);}
  .chip:hover{transform:translateY(-1px);}

  /* saved prompts */
  .saved-prompts-bar{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .saved-toggle-btn,.save-current-btn{background:rgba(255,255,255,0.04);border:1px solid var(--border-tint);
    color:var(--text-secondary);border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;
    font-family:'Inter',sans-serif;transition:all .2s ease;}
  .saved-toggle-btn:hover,.save-current-btn:hover{border-color:rgba(139,92,246,0.4);color:var(--text-primary);}
  .save-current-btn:disabled{opacity:.4;cursor:not-allowed;}
  .saved-prompts-panel{margin-top:10px;border:1px solid var(--border-tint);border-radius:10px;
    background:rgba(255,255,255,0.03);padding:8px;max-height:220px;overflow-y:auto;}
  .saved-prompt-row{display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:7px 9px;border-radius:8px;transition:background .2s ease;}
  .saved-prompt-row:hover{background:rgba(139,92,246,0.08);}
  .saved-prompt-name{flex:1;min-width:0;font-size:12.5px;color:var(--text-primary);cursor:pointer;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .saved-prompt-actions{display:flex;gap:2px;flex-shrink:0;}
  .saved-icon-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:3px 6px;
    border-radius:5px;transition:background .2s ease;line-height:1;}
  .saved-icon-btn:hover{background:rgba(255,255,255,0.08);}
  .saved-empty{color:var(--text-muted);font-size:12px;text-align:center;padding:14px 6px;}
  .storage-warning{font-size:11px;color:var(--warning);margin-top:8px;padding:0 4px;line-height:1.5;}

  .footer-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
  .hint{font-size:12px;color:var(--text-muted);line-height:1.5;}
  .compare-btn{font-family:'Sora',sans-serif;font-weight:600;font-size:14px;color:#0B0F1A;
    background:linear-gradient(90deg,var(--blue),var(--purple));border:none;border-radius:10px;
    padding:11px 24px;cursor:pointer;transition:transform .2s ease, box-shadow .25s ease;}
  .compare-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(59,130,246,0.35), 0 6px 24px rgba(139,92,246,0.25);}
  .compare-btn:disabled{opacity:0.4;cursor:not-allowed;}

  /* results */
  .results{display:grid;gap:16px;margin-top:14px;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));}
  .results-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:22px;flex-wrap:wrap;}

  /* modals */
  .modal-overlay{position:absolute;inset:0;background:rgba(6,9,20,0.7);backdrop-filter:blur(4px);
    display:none;align-items:flex-start;justify-content:center;padding-top:60px;z-index:50;border-radius:20px;}
  .modal-overlay.open{display:flex;}
  .modal{width:440px;max-width:90%;background:var(--panel-glass-strong);backdrop-filter:blur(20px);
    border:1px solid transparent;border-image:linear-gradient(135deg, rgba(59,130,246,0.5), rgba(139,92,246,0.5)) 1;
    border-radius:18px;padding:24px;}
  .modal h3{font-family:'Sora',sans-serif;font-weight:700;font-size:17px;margin:0 0 6px;}
  .modal .sub{font-size:12.5px;color:var(--text-muted);margin:0 0 18px;line-height:1.6;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:11.5px;color:var(--text-secondary);margin-bottom:5px;font-weight:500;}
  .field input, .field textarea{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border-tint);border-radius:8px;padding:9px 11px;color:var(--text-primary);font-size:13px;outline:none;}

  /* history sidebar */
  .app-shell{display:flex;align-items:stretch;}
  .sidebar-toggle-col{flex-shrink:0;width:22px;display:flex;justify-content:center;padding-top:36px;}
  .sidebar-toggle{width:24px;height:24px;border-radius:50%;background:var(--panel-glass);border:1px solid var(--border-tint);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .history-drawer{width:0;flex-shrink:0;overflow:hidden;position:sticky;top:0;height:100vh;background:var(--panel-glass);backdrop-filter:blur(16px);border-right:1px solid transparent;transition:width .25s ease, padding .25s ease;display:flex;flex-direction:column;padding:0;}
  .history-drawer.open{width:290px;padding:22px 16px;border-right-color:var(--border-tint);}
  .history-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .history-search{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border-tint);border-radius:8px;padding:8px 11px;color:var(--text-primary);margin-bottom:14px;}
  .history-list{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px;}
  .main-col{flex:1;min-width:0;}
</style>
</head>
<body>
<div class="app-shell">

  <aside class="history-drawer open" id="historyDrawer">
    <div class="history-head">
      <h3>Comparison history</h3>
      <button class="clear-history-btn" id="clearHistoryBtn">Clear</button>
    </div>
    <input class="history-search" id="historySearch" type="text" placeholder="Search past prompts...">
    <div class="history-list" id="historyList"></div>
  </aside>

  <div class="sidebar-toggle-col">
    <button class="sidebar-toggle" id="historyBtn">‹</button>
  </div>

  <div class="main-col">
  <div class="wrap" style="position:relative;">

  <div class="header">
    <div class="brand">
      <div class="orb-wrap">
        <div class="orb" id="orb"></div>
        <div class="waveform"><span></span><span></span><span></span><span></span><span></span></div>
      </div>
      <div class="brand-text">
        <div class="word">BAMBAMAI</div>
        <div class="eyebrow" id="eyebrowText">Comparison mode</div>
      </div>
    </div>
    <div class="header-actions">
      <div class="auth-container">
        <button id="loginBtn" class="login-btn">Log in / Sign up</button>
        <div id="userProfile" class="user-profile" style="display: none;">
          <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
          <div class="user-details">
            <span id="userName" class="user-name"></span>
            <span id="logoutBtn" class="logout-link">Log out</span>
          </div>
        </div>
      </div>
      <button class="theme-btn" id="themeBtn">◐</button>
      <button class="gear-btn" id="gearBtn">⚙</button>
    </div>
  </div>

  <div class="mode-toggle" id="modeToggle">
    <button class="mode-btn active" data-mode="comparison">⚖ Comparison Mode</button>
    <button class="mode-btn" data-mode="direct">🎯 Direct Mode</button>
  </div>

  <div class="composer">
    <textarea id="promptInput" placeholder="Ask one question..."></textarea>
    <div class="chip-row" id="chipRow"></div>
    <div class="footer-row">
      <div class="hint" id="hintText">Add providers via ⚙ settings.</div>
      <button class="compare-btn" id="compareBtn">Compare ↗</button>
    </div>
  </div>

  <div class="results" id="results"></div>

  </div>
  </div>
</div>

<script>
  // UI Functionality Scripts
  const historyBtn = document.getElementById('historyBtn');
  const historyDrawer = document.getElementById('historyDrawer');
  historyBtn.onclick = () => {
    const isOpen = historyDrawer.classList.toggle('open');
    historyBtn.textContent = isOpen ? '‹' : '›';
  };
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDdlKJg9cdXen0CNZdlnWU-6r5ym7UiwJE",
    authDomain: "bambamai-29f3f.firebaseapp.com",
    projectId: "bambamai-29f3f",
    storageBucket: "bambamai-29f3f.firebasestorage.app",
    messagingSenderId: "1040838702888",
    appId: "1:1040838702888:web:84c9e13503071bc9aa421d"
  };

  // Init Connection
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // Elements mapping
  const loginBtn = document.getElementById('loginBtn');
  const userProfile = document.getElementById('userProfile');
  const userAvatar = document.getElementById('userAvatar');
  const userName = document.getElementById('userName');
  const logoutBtn = document.getElementById('logoutBtn');

  // Trigger Google Auth Setup
  loginBtn.onclick = () => {
    signInWithPopup(auth, provider)
      .then((result) => {
        console.log("Success login:", result.user);
      }).catch((err) => {
        console.error("Auth process interrupted:", err);
      });
  };

  // Sign out method
  logoutBtn.onclick = () => {
    signOut(auth).then(() => {
      console.log("Logged out cleanly");
    });
  };

  // State Observer for Login Sessions
  onAuthStateChanged(auth, (user) => {
    if (user) {
      loginBtn.style.display = 'none';
      userProfile.style.display = 'flex';
      userAvatar.src = user.photoURL || "https://via.placeholder.com/150";
      userName.textContent = user.displayName || "User";
      
      // Save data back on DB reference point
      setDoc(doc(db, "users", user.uid), {
        name: user.displayName,
        email: user.email,
        photo: user.photoURL,
        lastActive: new Date()
      }, { merge: true });
    } else {
      loginBtn.style.display = 'block';
      userProfile.style.display = 'none';
    }
  });
</script>
</body>
</html>
